services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: studymate_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studymate_ai
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - studymate_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: studymate_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/studymate_ai
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGIN: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3001,http://127.0.0.2:3001
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/backend/src
      - backend_node_modules:/app/backend/node_modules
    networks:
      - studymate_network
    command: npm --workspace backend run dev
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: .
      dockerfile: ./front/Dockerfile
    container_name: studymate_frontend
    environment:
      VITE_API_URL: http://localhost:5000
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./front/src:/app/front/src
      - ./front/index.html:/app/front/index.html
    networks:
      - studymate_network
    command: npm --workspace front run dev
    command: npm --workspace frontend run dev
    restart: unless-stopped

networks:
  studymate_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_node_modules:
    driver: local
